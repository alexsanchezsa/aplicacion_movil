<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="gradHead" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </radialGradient>
    <radialGradient id="gradBody" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </radialGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="1" />
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in2="blur" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#0D47A1" flood-opacity="0.35"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <!-- Head (centered and slightly lowered, with gradient and inner shadow) -->
  <circle cx="12" cy="8.3" r="3" fill="url(#gradHead)" filter="url(#innerShadow)"/>
  
  <!-- Body (gradient fill, smooth curves) -->
  <path fill="url(#gradBody)" filter="url(#innerShadow)"
        d="M6 18c0-3.3 2.7-6 6-6s6 2.7 6 6v2H6v-2z"/>

  <!-- Medical Cross (white, centered on shoulder) -->
  <rect x="14.3" y="14.7" width="1.8" height="4.6" fill="#FFFFFF"/>
  <rect x="12.8" y="16.2" width="4.6" height="1.8" fill="#FFFFFF"/>
</svg>
