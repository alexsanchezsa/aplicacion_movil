<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43CD6E"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#1B5E20" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Clipboard base -->
  <rect x="5" y="4" width="14" height="17" rx="2" ry="2" fill="url(#gradGreen)" filter="url(#shadow)"/>

  <!-- Clipboard tab -->
  <rect x="8.5" y="2" width="7" height="3" rx="1" ry="1" fill="url(#gradGreen)" filter="url(#shadow)"/>

  <!-- Text lines -->
  <rect x="8" y="8" width="8" height="1.6" rx="0.8" fill="#FFFFFF"/>
  <rect x="8" y="11" width="8" height="1.6" rx="0.8" fill="#FFFFFF"/>
  <rect x="8" y="14" width="5" height="1.6" rx="0.8" fill="#FFFFFF"/>
</svg>
